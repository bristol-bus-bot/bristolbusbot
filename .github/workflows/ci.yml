name: CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m compileall -q site pipeline collector deploy
      - run: pip install -e "collector[dev]" -e "site[dev]" flask paramiko
      - run: python -m pytest collector -q
      - run: python -m pytest site -q
      - run: python -m pytest pipeline/tests audit-site/tests deploy/tests -q

  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bot/package-lock.json
      - run: npm ci
        working-directory: bot
      - run: npm test
        working-directory: bot

  site-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm test
        working-directory: site

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: every component has a real README
        run: |
          for d in collector site bot pipeline deploy audit-site; do
            test -s "$d/README.md" || { echo "missing or empty $d/README.md"; exit 1; }
          done
          if find . -name 'PUBLIC_README.md' -print -quit | grep -q .; then
            echo "PUBLIC_README.md is a staging artefact; keep one README per component"
            exit 1
          fi

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # gitleaks scans FULL history, not just the tip
      - name: gitleaks (history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: scan_secrets (working tree)
        run: python scripts/scan_secrets.py
      - name: scan_public_metadata (working tree)
        run: python scripts/scan_public_metadata.py
